name: Update OSS footprints

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render OSS footprints
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: hcsum
        run: node scripts/update-oss-footprints.mjs

      - name: Commit changes
        run: |
          if git diff --quiet README.md assets/oss-footprints.svg; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/oss-footprints.svg
          git commit -m "docs(profile): update OSS footprints

          - refresh recent public PR, issue, review, and comment interactions
          - update the generated OSS footprints section and chart assets

          Reason:
          Keep the GitHub profile focused on repositories that currently reflect my technical interests."
          git push
